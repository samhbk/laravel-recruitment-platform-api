services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_DEV: "true"
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: recruitment
      DB_USERNAME: recruitment
      DB_PASSWORD: recruitment
      CACHE_STORE: redis
      QUEUE_CONNECTION: database
      SESSION_DRIVER: array
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-use-php-artisan-jwt-secret-for-real-use}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/var/www/html
    command: >
      sh -c "composer install --no-interaction &&
             php artisan key:generate --force || true &&
             php artisan jwt:secret --force || true &&
             php artisan migrate --force &&
             php artisan db:seed --force || true &&
             php artisan serve --host=0.0.0.0 --port=8000"

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: recruitment
      MYSQL_USER: recruitment
      MYSQL_PASSWORD: recruitment
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - recruitment_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  recruitment_mysql:
